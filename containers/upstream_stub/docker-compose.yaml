# Upstream Stub Docker Compose for local testing
version: '3.8'

services:
  upstream-stub:
    build:
      context: ../..
      dockerfile: containers/upstream_stub/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - RUST_LOG=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
