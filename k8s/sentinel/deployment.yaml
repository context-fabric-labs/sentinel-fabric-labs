apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  namespace: sentinel-fabric
  labels:
    app.kubernetes.io/name: sentinel
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel
    spec:
      serviceAccountName: sentinel-sa
      containers:
        - name: sentinel
          image: sentinel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: RUST_LOG
              value: "info"
            - name: UPSTREAM_URL
              value: "http://upstream-stub:4000"
