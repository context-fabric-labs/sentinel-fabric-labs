apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  namespace: sentinel-fabric
  labels:
    app.kubernetes.io/name: vllm-inference
    app.kubernetes.io/component: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-inference
    spec:
      enableServiceLinks: false
      serviceAccountName: sentinel-sa
      restartPolicy: Always
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ENABLE_UNINTERRUPTIBLE_KV_CACHE
              value: "0"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "6Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "3"
              memory: "10Gi"
              nvidia.com/gpu: "1"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-secret
                  key: token
                  optional: true
            - name: MODEL_ID
              value: "meta-llama/Llama-3.1-8B-Instruct"
          command:
            - "python3"
            - "-m"
            - "vllm.entrypoints.openai.api_server"
            - "--model"
            - "$(MODEL_ID)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "2048"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
