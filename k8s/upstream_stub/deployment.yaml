apiVersion: apps/v1
kind: Deployment
metadata:
  name: upstream-stub
  namespace: sentinel-fabric
  labels:
    app.kubernetes.io/name: upstream-stub
    app.kubernetes.io/component: stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: upstream-stub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: upstream-stub
    spec:
      serviceAccountName: upstream-stub-sa
      containers:
        - name: upstream-stub
          image: upstream_stub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: RUST_LOG
              value: "info"
